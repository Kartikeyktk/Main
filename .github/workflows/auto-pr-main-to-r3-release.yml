name: Auto PR — Main to R3-Develop

on:
  push:
    branches:
      - main

env:
  TARGET_BRANCH: R3-Develop

jobs:
  create-pull-request:
    name: Create PR from main → R3-Develop
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Validate Target Branch Exists ────────────────────────────────────
      - name: Validate Target Branch Exists
        id: check_branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo " Checking if target branch '$TARGET_BRANCH' exists on remote..."

          BRANCH_EXISTS=$(git ls-remote --heads origin "refs/heads/$TARGET_BRANCH")

          if [ -z "$BRANCH_EXISTS" ]; then
            echo "ERROR: Target branch '$TARGET_BRANCH' does not exist in the repository."
            echo "Please create the branch first: git checkout -b $TARGET_BRANCH && git push origin $TARGET_BRANCH"
            echo "branch_exists=false" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "Target branch '$TARGET_BRANCH' found — proceeding."
            echo "branch_exists=true" >> $GITHUB_OUTPUT
          fi

      # ── 3. Check for Existing Open PR ───────────────────────────────────────
      - name: Check for Existing Open PR
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING_PR=$(gh pr list \
            --base "$TARGET_BRANCH" \
            --head main \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -n "$EXISTING_PR" ]; then
            echo "exists=true"            >> $GITHUB_OUTPUT
            echo "pr_number=$EXISTING_PR" >> $GITHUB_OUTPUT
          else
            echo "exists=false"           >> $GITHUB_OUTPUT
          fi

      # ── 4. Create Pull Request ───────────────────────────────────────────────
      - name: Create Pull Request
        if: steps.check_pr.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base "$TARGET_BRANCH" \
            --head main \
            --title "chore: Auto PR — merge main into $TARGET_BRANCH ($(date +'%Y-%m-%d %H:%M UTC'))" \
            --body "## Automated Pull Request

          This PR was automatically generated by GitHub Actions after a merge to **\`main\`**.

          | Field        | Value |
          |--------------|-------|
          | Source       | \`main\` |
          | Target       | \`$TARGET_BRANCH\` |
          | Commit SHA   | \`${{ github.sha }}\` |
          | Triggered by | @${{ github.actor }} |
          | Workflow Run | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

          > Please review all changes before merging to keep the **$TARGET_BRANCH** branch current."

          echo " Pull Request created successfully."

      # ── 5. Skip — PR Already Exists ─────────────────────────────────────────
      - name: Skip — PR Already Exists
        if: steps.check_pr.outputs.exists == 'true'
        run: |
          echo " An open PR from main → $TARGET_BRANCH already exists (PR #${{ steps.check_pr.outputs.pr_number }}). Skipping."
