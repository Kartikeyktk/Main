name: Auto PR — Main to R3-Develop

on:
  push:
    branches:
      - main

jobs:
  create-pull-request:
    name: Create PR from main → R3-Develop
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for Existing Open PR
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING_PR=$(gh pr list \
            --base R3-Develop \
            --head main \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -n "$EXISTING_PR" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "pr_number=$EXISTING_PR" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check_pr.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base R3-Release \
            --head main \
            --title "chore: Auto PR — merge main into R3-Develop ($(date +'%Y-%m-%d %H:%M UTC'))" \
            --body "## 🤖 Automated Pull Request

          This PR was automatically generated by GitHub Actions after a merge to **\`main\`**.

          | Field        | Value |
          |--------------|-------|
          | Source       | \`main\` |
          | Target       | \`R3-Develop\` |
          | Commit SHA   | \`${{ github.sha }}\` |
          | Triggered by | @${{ github.actor }} |
          | Workflow Run | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

          > Please review all changes before merging to keep the **R3-Develop** branch current."

          echo "✅ Pull Request created successfully."

      - name: Skip — PR Already Exists
        if: steps.check_pr.outputs.exists == 'true'
        run: |
          echo "⚠️ An open PR from main → R3-Develop already exists (PR #${{ steps.check_pr.outputs.pr_number }}). Skipping."
